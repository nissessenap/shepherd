name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  SHEPHERD_IMAGE: ghcr.io/${{ github.repository_owner }}/shepherd
  RUNNER_IMAGE: ghcr.io/${{ github.repository_owner }}/shepherd-runner

jobs:
  shepherd:
    name: Build shepherd image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        env:
          KO_DOCKER_REPO: ${{ env.SHEPHERD_IMAGE }}
        run: |
          ko build --sbom=none --bare --platform=linux/amd64 \
            --tags=${{ github.ref_name }} \
            --image-refs ./image-digest \
            --image-label "org.opencontainers.image.title=shepherd" \
            --image-label "org.opencontainers.image.description=Background coding agent orchestrator on Kubernetes" \
            --image-label "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}" \
            --image-label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --image-label "org.opencontainers.image.version=${{ github.ref_name }}" \
            --image-label "org.opencontainers.image.revision=${{ github.sha }}" \
            --image-label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --image-label "org.opencontainers.image.licenses=Apache-2.0" \
            ./cmd/shepherd/

          IMAGE_REF=$(head -n 1 ./image-digest)
          IMAGE_DIGEST=$(echo "$IMAGE_REF" | cut -d'@' -f2)
          echo "digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.SHEPHERD_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  runner:
    name: Build shepherd-runner image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.RUNNER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=shepherd-runner
            org.opencontainers.image.description=Shepherd runner for executing coding tasks via Claude Code
            org.opencontainers.image.licenses=Apache-2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/runner/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.RUNNER_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
