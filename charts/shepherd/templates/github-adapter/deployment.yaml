{{- if .Values.githubAdapter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shepherd.fullname" . }}-github-adapter
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.componentLabels" (dict "context" . "component" "github-adapter") | nindent 4 }}
  {{- with .Values.githubAdapter.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.githubAdapter.replicas }}
  selector:
    matchLabels:
      {{- include "shepherd.componentSelectorLabels" (dict "context" . "component" "github-adapter") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.githubAdapter.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "shepherd.componentLabels" (dict "context" . "component" "github-adapter") | nindent 8 }}
        {{- with .Values.githubAdapter.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with (coalesce .Values.githubAdapter.imagePullSecrets .Values.global.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "shepherd.serviceAccountName" (dict "context" . "component" "github-adapter" "sa" .Values.githubAdapter.serviceAccount) }}
      securityContext:
        {{- toYaml .Values.githubAdapter.podSecurityContext | nindent 8 }}
      containers:
        - name: github-adapter
          securityContext:
            {{- toYaml .Values.githubAdapter.securityContext | nindent 12 }}
          image: {{ include "shepherd.image" (dict "service" .Values.githubAdapter.image "global" .Values.global.image "defaultVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.githubAdapter.image.pullPolicy }}
          command:
            - /ko-app/shepherd
          args:
            - github
            - --listen-addr=:{{ .Values.githubAdapter.service.port }}
            - --api-url={{ printf "http://%s-api.%s.svc.cluster.local:%d" (include "shepherd.fullname" .) (include "shepherd.namespace" .) (.Values.api.service.internalPort | int) }}
            - --default-sandbox-template={{ .Values.githubAdapter.defaultSandboxTemplate }}
            {{- if .Values.githubAdapter.callbackURL }}
            - --callback-url={{ .Values.githubAdapter.callbackURL }}
            {{- end }}
          env:
            - name: SHEPHERD_GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubAdapter.existingSecret }}
                  key: webhook-secret
            - name: SHEPHERD_GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubAdapter.existingSecret }}
                  key: app-id
            - name: SHEPHERD_GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubAdapter.existingSecret }}
                  key: installation-id
            - name: SHEPHERD_GITHUB_PRIVATE_KEY_PATH
              value: /etc/shepherd/github-app-key
            {{- if .Values.githubAdapter.callbackURL }}
            - name: SHEPHERD_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubAdapter.existingSecret }}
                  key: callback-secret
                  optional: true
            {{- end }}
          ports:
            - name: webhook
              containerPort: {{ .Values.githubAdapter.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: webhook
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.githubAdapter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: github-app-key
              mountPath: /etc/shepherd
              readOnly: true
      volumes:
        - name: github-app-key
          secret:
            secretName: {{ .Values.githubAdapter.existingSecret }}
            items:
              - key: private-key
                path: github-app-key
      terminationGracePeriodSeconds: 10
      {{- with .Values.githubAdapter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.githubAdapter.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.githubAdapter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
