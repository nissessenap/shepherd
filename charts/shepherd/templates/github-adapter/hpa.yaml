{{- if and .Values.githubAdapter.enabled .Values.githubAdapter.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "shepherd.fullname" . }}-github-adapter
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.componentLabels" (dict "context" . "component" "github-adapter") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "shepherd.fullname" . }}-github-adapter
  minReplicas: {{ .Values.githubAdapter.hpa.minReplicas }}
  maxReplicas: {{ .Values.githubAdapter.hpa.maxReplicas }}
  metrics:
    {{- toYaml .Values.githubAdapter.hpa.metrics | nindent 4 }}
{{- end }}
