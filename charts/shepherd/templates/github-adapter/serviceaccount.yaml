{{- if and .Values.githubAdapter.enabled .Values.githubAdapter.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shepherd.serviceAccountName" (dict "context" . "component" "github-adapter" "sa" .Values.githubAdapter.serviceAccount) }}
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.componentLabels" (dict "context" . "component" "github-adapter") | nindent 4 }}
  {{- with .Values.githubAdapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.githubAdapter.serviceAccount.automountServiceAccountToken }}
{{- end }}
